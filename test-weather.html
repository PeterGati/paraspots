<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Open-Meteo Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .weather-test {
            max-width: 960px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .weather-current {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .big-temp {
            font-size: 3.4rem;
            font-weight: 700;
            color: #0a2a5e;
        }
        .wind-info {
            font-size: 1.25rem;
        }
        .weather-status {
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .good { background:#22c55e; color:white; }
        .caution { background:#eab308; color:#1f2a36; }
        .bad { background:#ef4444; color:white; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <h1>🧪 Test Weather Page v2</h1>
        <p>Csak tesztelésre</p>
    </div>
</header>

<div class="weather-test">
    <h2>Planai – Időjárás teszt</h2>
    <div id="weather-result">
        <p>Ladom az adatokat...</p>
    </div>
</div>

<script>
// Segédfüggvény: fokból irány
function degreesToDirection(degrees) {
    const dirs = ["N", "NO", "O", "SO", "S", "SW", "W", "NW"];
    const index = Math.round(degrees / 45) % 8;
    return dirs[index];
}

async function loadWeather() {
    const lat = 47.37208;
    const lon = 13.72553;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability` +
        `&forecast_days=2&timezone=Europe/Vienna`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;

        const windDirText = degreesToDirection(c.wind_direction_10m);

        let html = `
            <div class="weather-current">
                <div>
                    <span class="big-temp">${c.temperature_2m}°C</span>
                </div>
                <div class="wind-info">
                    <p><strong>Szél:</strong> ${windDirText} ${Math.round(c.wind_speed_10m)} km/h</p>
                    <p><strong>Lökések:</strong> ${Math.round(c.wind_gusts_10m)} km/h</p>
                    <p><strong>Csapadék:</strong> ${c.precipitation_probability}%</p>
                </div>
            </div>
        `;

        // Repülhetőség
        let statusClass = "caution";
        let statusText = "Közepes körülmények";
        if (c.wind_speed_10m < 18 && c.precipitation_probability < 30) {
            statusClass = "good";
            statusText = "🟢 JÓ REPÜLŐ IDŐ";
        } else if (c.wind_speed_10m > 35 || c.precipitation_probability > 70) {
            statusClass = "bad";
            statusText = "🔴 NEM AJÁNLOTT";
        }

        html += `<div class="weather-status ${statusClass}">${statusText}</div>`;

        document.getElementById("weather-result").innerHTML = html;

    } catch (e) {
        document.getElementById("weather-result").innerHTML = 
            `<p style="color:red;">Hiba: ${e.message}</p>`;
    }
}

loadWeather();
</script>

</body>
</html>
