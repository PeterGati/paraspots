<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Open-Meteo Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .weather-test {
            max-width: 960px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .weather-current {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }
        .big-temp {
            font-size: 3.5rem;
            font-weight: 700;
            color: #0a2a5e;
        }
        .weather-status {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.15rem;
        }
        .good { background:#22c55e; color:white; }
        .caution { background:#eab308; color:#1f2a36; }
        .bad { background:#ef4444; color:white; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <h1>🧪 Test Weather Page (Biztonságos teszt)</h1>
        <p>Ez az oldal nem látható a menüből. Csak tesztelésre van.</p>
    </div>
</header>

<div class="weather-test">
    <h2>Planai – Időjárás teszt</h2>
    <div id="weather-result">
        <p>Ladom az adatokat...</p>
    </div>
</div>

<script>
// ==================== OPEN-METEO TESZT ====================
async function loadWeather() {
    const lat = 47.37208;
    const lon = 13.72553;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability` +
        `&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation_probability,cape` +
        `&forecast_days=2&timezone=Europe/Vienna`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        let html = `<h3>Aktuális (${new Date().toLocaleTimeString('de-AT')})</h3>`;

        const c = data.current;
        const windDir = Math.round(c.wind_direction_10m);

        html += `<div class="weather-current">`;
        html += `<div><span class="big-temp">${c.temperature_2m}°C</span></div>`;
        html += `<div>`;
        html += `<p><strong>Szél:</strong> ${windDir}° — ${c.wind_speed_10m} km/h</p>`;
        html += `<p><strong>Lökések:</strong> ${c.wind_gusts_10m} km/h</p>`;
        html += `<p><strong>Csapadék esély:</strong> ${c.precipitation_probability}%</p>`;
        html += `</div></div>`;

        // Egyszerű repülhetőség
        let status = "caution";
        let text = "Közepes";
        if (c.wind_speed_10m < 18 && c.precipitation_probability < 30) {
            status = "good";
            text = "🟢 JÓ REPÜLŐ IDŐ";
        } else if (c.wind_speed_10m > 35 || c.precipitation_probability > 70) {
            status = "bad";
            text = "🔴 NEM AJÁNLOTT";
        }

        html += `<div class="weather-status ${status}">${text}</div>`;

        document.getElementById("weather-result").innerHTML = html;

    } catch (e) {
        document.getElementById("weather-result").innerHTML = 
            `<p style="color:red;">Hiba: ${e.message}</p>`;
    }
}

loadWeather();
</script>

</body>
</html>
