<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Open-Meteo Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .weather-test {
            max-width: 960px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .wind-main {
            font-size: 3.6rem;
            font-weight: 700;
            color: #0a2a5e;
            line-height: 1;
        }
        .gust {
            font-size: 1.3rem;
            color: #e11d48;
            font-weight: 600;
        }
        .weather-link {
            display: inline-block;
            margin-top: 12px;
            color: #0a2a5e;
            font-weight: 600;
            text-decoration: none;
        }
        .weather-link:hover {
            text-decoration: underline;
        }
        .weather-status {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 10px;
            display: inline-block;
        }
        .good { background:#22c55e; color:white; }
        .caution { background:#eab308; color:#1f2a36; }
        .bad { background:#ef4444; color:white; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <h1>🧪 Test Weather Page (Kezdőlap mini verzió)</h1>
    </div>
</header>

<div class="weather-test">
    <h2>Planai</h2>
    <div id="weather-result">
        <p>Lade Wetterdaten...</p>
    </div>
</div>

<script>
// Fokból irány
function degreesToDirection(deg) {
    const dirs = ["N", "NO", "O", "SO", "S", "SW", "W", "NW"];
    return dirs[Math.round(deg / 45) % 8];
}

async function loadWeather() {
    const lat = 47.37208;
    const lon = 13.72553;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability` +
        `&forecast_days=2&timezone=Europe/Vienna`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;

        const windDir = degreesToDirection(c.wind_direction_10m);

        let html = `
            <div style="display:flex; align-items:center; gap:25px;">
                <div>
                    <span class="wind-main">${windDir} ${Math.round(c.wind_speed_10m)} km/h</span>
                    <p class="gust">Böen: ${Math.round(c.wind_gusts_10m)} km/h</p>
                </div>
                <div>
                    <p>${c.temperature_2m} °C</p>
                    <p>Niederschlag: ${c.precipitation_probability}%</p>
                </div>
            </div>
        `;

        let statusClass = "caution";
        let statusText = "Mittel";

        if (c.wind_speed_10m < 18 && c.precipitation_probability < 25) {
            statusClass = "good";
            statusText = "🟢 Gut zu fliegen";
        } else if (c.wind_speed_10m > 35 || c.precipitation_probability > 65) {
            statusClass = "bad";
            statusText = "🔴 Nicht empfohlen";
        }

        html += `<div class="weather-status ${statusClass}">${statusText}</div>`;
        
        // Kattintható sor a részletes oldalra
        html += `
            <p><a href="startplatz.html?region=steiermark&site=planai" class="weather-link">
                → Wettervorhersage (2 Tage)
            </a></p>
        `;

        document.getElementById("weather-result").innerHTML = html;

    } catch (e) {
        document.getElementById("weather-result").innerHTML = 
            `<p style="color:red;">Fehler beim Laden der Wetterdaten.</p>`;
    }
}

loadWeather();
</script>

</body>
</html>
