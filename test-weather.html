<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Open-Meteo Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .weather-test {
            max-width: 960px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .wind-main {
            font-size: 3.8rem;
            font-weight: 700;
            color: #0a2a5e;
            line-height: 1;
        }
        .gust {
            font-size: 1.35rem;
            color: #e11d48;
            font-weight: 600;
        }
        .temp-small {
            font-size: 1.6rem;
            color: #555;
        }
        .weather-status {
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.25rem;
            margin-top: 15px;
            display: inline-block;
        }
        .good { background:#22c55e; color:white; }
        .caution { background:#eab308; color:#1f2a36; }
        .bad { background:#ef4444; color:white; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <h1>🧪 Test Weather Page v4 - Szél fókusz</h1>
    </div>
</header>

<div class="weather-test">
    <h2>Planai – Időjárás teszt</h2>
    <div id="weather-result">
        <p>Ladom az adatokat...</p>
    </div>
</div>

<script>
// Fokból irány
function degreesToDirection(deg) {
    const dirs = ["N", "NO", "O", "SO", "S", "SW", "W", "NW"];
    return dirs[Math.round(deg / 45) % 8];
}

async function loadWeather() {
    const lat = 47.37208;
    const lon = 13.72553;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability` +
        `&forecast_days=2&timezone=Europe/Vienna`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;

        const windDir = degreesToDirection(c.wind_direction_10m);

        let html = `
            <div style="display:flex; align-items:center; gap:25px; margin-bottom:15px;">
                <div>
                    <span class="wind-main">${windDir} ${Math.round(c.wind_speed_10m)} km/h</span>
                    <p class="gust">Lökések: ${Math.round(c.wind_gusts_10m)} km/h</p>
                </div>
                <div class="temp-small">
                    ${c.temperature_2m} °C<br>
                    Csapadék: ${c.precipitation_probability}%
                </div>
            </div>
        `;

        let statusClass = "caution";
        let statusText = "Közepes körülmények";

        if (c.wind_speed_10m < 18 && c.precipitation_probability < 25) {
            statusClass = "good";
            statusText = "🟢 JÓ REPÜLŐ IDŐ";
        } else if (c.wind_speed_10m > 35 || c.precipitation_probability > 65) {
            statusClass = "bad";
            statusText = "🔴 NEM AJÁNLOTT";
        }

        html += `<div class="weather-status ${statusClass}">${statusText}</div>`;

        document.getElementById("weather-result").innerHTML = html;

    } catch (e) {
        document.getElementById("weather-result").innerHTML = 
            `<p style="color:red;">Hiba: ${e.message}</p>`;
    }
}

loadWeather();
</script>

</body>
</html>
