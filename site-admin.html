<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PARA:AT – Site Admin EXTENDED</title>

<style>
body { font-family: Arial; max-width: 1100px; margin: 40px auto; }
fieldset { margin-bottom: 25px; padding: 15px; }
legend { font-weight: bold; }
label { display:block; margin-top:8px; }
input, textarea { width:100%; padding:6px; margin-top:4px; }
button { margin-top:15px; padding:8px 12px; cursor:pointer; }
pre { background:#f4f4f4; padding:15px; overflow:auto; }
.valid { border:2px solid #2b7cff; }
.invalid { border:2px solid #d40000; }
.block { border:1px solid #ddd; padding:10px; margin:10px 0; }
</style>
</head>
<body>

<h1>Site Admin – FULL EDITOR</h1>

<form>

<fieldset>
<legend>Grunddaten</legend>

<label>Region
<input type="text" id="region" readonly>
</label>

<label>Name
<input type="text" id="name" readonly>
</label>

<label>Breitengrad
<input type="text" id="lat">
</label>

<label>Längengrad
<input type="text" id="lon">
</label>

<label>Talhöhe
<input type="number" id="talHeight">
</label>

<label>Beschreibung
<textarea id="description"></textarea>
</label>

<label>Overall Rating
<input type="number" step="0.5" min="0" max="5" id="overallRating">
</label>

<label>Thermik Rating
<input type="number" step="0.5" min="0" max="5" id="thermalRating">
</label>

</fieldset>

<fieldset>
<legend>Operator</legend>

<label>Name
<input type="text" id="operatorName">
</label>

<label>Website
<input type="text" id="operatorUrl">
</label>

<label>Telefon
<input type="text" id="operatorPhone">
</label>

</fieldset>

<fieldset>
<legend>Zugang</legend>

<label><input type="checkbox" id="accessCar"> Auto</label>
<label><input type="checkbox" id="accessPublic"> Öffis</label>
<label><input type="checkbox" id="accessHike"> Hike & Fly</label>
<label><input type="checkbox" id="accessCable"> Seilbahn</label>

<label>Parken (Beschreibung)
<input type="text" id="accessParking">
</label>

</fieldset>

<fieldset>
<legend>Lufträume</legend>

<label>Airspaces (Komma getrennt)
<input type="text" id="airspaces">
</label>

</fieldset>

<fieldset>
<legend>Flugmöglichkeiten</legend>

<label><input type="checkbox" id="fcSoaring"> Soaring</label>
<label><input type="checkbox" id="fcThermal"> Thermik</label>
<label><input type="checkbox" id="fcXC"> Streckenflug</label>

</fieldset>

<fieldset>
<legend>Windrichtungen (Site)</legend>

<label><input type="checkbox" value="N" class="windDir"> N</label>
<label><input type="checkbox" value="NO" class="windDir"> NO</label>
<label><input type="checkbox" value="O" class="windDir"> O</label>
<label><input type="checkbox" value="SO" class="windDir"> SO</label>
<label><input type="checkbox" value="S" class="windDir"> S</label>
<label><input type="checkbox" value="SW" class="windDir"> SW</label>
<label><input type="checkbox" value="W" class="windDir"> W</label>
<label><input type="checkbox" value="NW" class="windDir"> NW</label>

</fieldset>

<fieldset>
<legend>Webcam & Anfahrt</legend>

<label>Webcam URL
<input type="text" id="webcam">
</label>

<label>Anfahrt Beschreibung
<textarea id="approachDescription"></textarea>
</label>

</fieldset>

<fieldset>
<legend>Startpunkte</legend>

<div id="startpunkte-container"></div>
<button type="button" onclick="addStartpunkt()">+ Neuer Startpunkt</button>

</fieldset>

<fieldset>
<legend>Landeplätze</legend>

<div id="landeplaetze-container"></div>
<button type="button" onclick="addLandeplatz()">+ Neuer Landeplatz</button>

</fieldset>

<button type="button" onclick="generateJSON()">Speichern</button>

</form>

<pre id="output"></pre>

<script>

let originalData = null;

async function saveToGitHub(data) {

const response = await fetch(
"https://paraspots-save.petergati.workers.dev",
{
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

if (response.ok) {
alert("Site gespeichert");
} else {
alert("Fehler beim Speichern");
}

}

const params = new URLSearchParams(window.location.search);
const region = params.get("region");
const site = params.get("site");

fetch(`data/${region}/${site}.json`)
.then(res => res.json())
.then(data => {

originalData = data;

document.getElementById("region").value = data.region;
document.getElementById("name").value = data.name;
document.getElementById("lat").value = data.coordinates?.lat ?? "";
document.getElementById("lon").value = data.coordinates?.lon ?? "";
document.getElementById("talHeight").value = data.talHeight ?? "";
document.getElementById("description").value = data.description ?? "";

document.getElementById("overallRating").value =
data.siteRatings?.overallRating ?? "";

document.getElementById("thermalRating").value =
data.siteRatings?.thermalRating ?? "";

document.getElementById("operatorName").value =
data.operator?.name ?? "";

document.getElementById("operatorUrl").value =
data.operator?.url ?? "";

document.getElementById("operatorPhone").value =
data.operator?.phone ?? "";

document.getElementById("accessCar").checked =
data.access?.car ?? false;

document.getElementById("accessPublic").checked =
data.access?.publicTransport ?? false;

document.getElementById("accessHike").checked =
data.access?.hikeAndFly ?? false;

document.getElementById("accessCable").checked =
data.access?.cableCar ?? false;

document.getElementById("accessParking").value =
data.access?.parking ?? "";

document.getElementById("airspaces").value =
(data.airspaces || []).join(",");

document.getElementById("fcSoaring").checked =
data.flightCharacteristics?.soaring ?? false;

document.getElementById("fcThermal").checked =
data.flightCharacteristics?.thermal ?? false;

document.getElementById("fcXC").checked =
data.flightCharacteristics?.crossCountry ?? false;

document.querySelectorAll(".windDir").forEach(cb=>{
cb.checked=(data.windDirections||[]).includes(cb.value);
});

document.getElementById("webcam").value=data.webcam ?? "";
document.getElementById("approachDescription").value=
data.approachDescription ?? "";

renderStartpunkte();
renderLandeplaetze();

});

function generateJSON(){

if(!originalData) return;

originalData.coordinates = originalData.coordinates || {};
originalData.siteRatings = originalData.siteRatings || {};
originalData.operator = originalData.operator || {};
originalData.access = originalData.access || {};
originalData.flightCharacteristics =
originalData.flightCharacteristics || {};

originalData.coordinates.lat =
parseFloat(document.getElementById("lat").value) || null;

originalData.coordinates.lon =
parseFloat(document.getElementById("lon").value) || null;

originalData.talHeight =
parseInt(document.getElementById("talHeight").value) || null;

originalData.description =
document.getElementById("description").value || null;

originalData.siteRatings.overallRating =
parseFloat(document.getElementById("overallRating").value) || null;

originalData.siteRatings.thermalRating =
parseFloat(document.getElementById("thermalRating").value) || null;

originalData.operator.name =
document.getElementById("operatorName").value || null;

originalData.operator.url =
document.getElementById("operatorUrl").value || null;

originalData.operator.phone =
document.getElementById("operatorPhone").value || null;

originalData.access.car =
document.getElementById("accessCar").checked;

originalData.access.publicTransport =
document.getElementById("accessPublic").checked;

originalData.access.hikeAndFly =
document.getElementById("accessHike").checked;

originalData.access.cableCar =
document.getElementById("accessCable").checked;

originalData.access.parking =
document.getElementById("accessParking").value || null;

originalData.airspaces =
document.getElementById("airspaces").value
.split(",")
.map(s=>s.trim())
.filter(Boolean);

originalData.flightCharacteristics.soaring =
document.getElementById("fcSoaring").checked;

originalData.flightCharacteristics.thermal =
document.getElementById("fcThermal").checked;

originalData.flightCharacteristics.crossCountry =
document.getElementById("fcXC").checked;

originalData.windDirections =
Array.from(document.querySelectorAll(".windDir:checked"))
.map(cb=>cb.value);

originalData.webcam =
document.getElementById("webcam").value || null;

originalData.approachDescription =
document.getElementById("approachDescription").value || null;

document.getElementById("output").textContent =
JSON.stringify(originalData,null,2);

saveToGitHub(originalData);

}

</script>

</body>
</html>
