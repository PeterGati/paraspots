<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PARASPOTS – Prototype</title>

<style>
body {
    font-family: system-ui;
    margin: 0;
    background: #f5f7fa;
}

/* HEADER */
.header {
    background: #1f2a36;
    color: white;
    padding: 20px;
    font-size: 20px;
}

/* SWITCH */
.mode-switch {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.mode-btn {
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    background: #eee;
    font-weight: 500;
}

.mode-btn.active {
    background: #2b7cff;
    color: white;
}

/* CONTENT */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* FILTERS */
.filter-group {
    margin-bottom: 15px;
}

.filter-title {
    font-size: 14px;
    margin-bottom: 6px;
    color: #555;
}

.filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.filter-chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: white;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 14px;
    transition: 0.15s;
}

.filter-chip.active {
    background: #2b7cff;
    color: white;
    border-color: #2b7cff;
}

/* SPOTS */
.spot-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: 0.15s;
}

.spot-card:hover {
    border-color: #2b7cff;
}

/* WINDY */
.windy {
    display: none;
    height: 75vh;
    border-radius: 10px;
    overflow: hidden;
}

.windy iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<div class="header">PARASPOTS</div>

<!-- SWITCH -->
<div class="mode-switch">
    <div class="mode-btn active" onclick="switchMode('spots')">Fluggebiete</div>
    <div class="mode-btn" onclick="switchMode('weather')">Wetter</div>
</div>

<div class="container">

    <!-- FILTER + LIST -->
    <div id="spotsMode">

        <!-- REGION -->
        <div class="filter-group">
            <div class="filter-title">Region</div>
            <div class="filter-row">
                <div class="filter-chip" onclick="toggle(this)">Tirol</div>
                <div class="filter-chip" onclick="toggle(this)">Salzburg</div>
                <div class="filter-chip" onclick="toggle(this)">Steiermark</div>
                <div class="filter-chip" onclick="toggle(this)">Kärnten</div>
                <div class="filter-chip" onclick="toggle(this)">NÖ</div>
            </div>
        </div>

        <!-- WIND -->
        <div class="filter-group">
            <div class="filter-title">Windrichtung</div>
            <div class="filter-row">
                <div class="filter-chip" onclick="toggle(this)">N</div>
                <div class="filter-chip" onclick="toggle(this)">NO</div>
                <div class="filter-chip" onclick="toggle(this)">O</div>
                <div class="filter-chip" onclick="toggle(this)">SO</div>
                <div class="filter-chip" onclick="toggle(this)">S</div>
                <div class="filter-chip" onclick="toggle(this)">SW</div>
            </div>
        </div>

        <!-- ACCESS -->
        <div class="filter-group">
            <div class="filter-title">Zugang</div>
            <div class="filter-row">
                <div class="filter-chip" onclick="toggle(this)">Hike & Fly</div>
                <div class="filter-chip" onclick="toggle(this)">Auto</div>
                <div class="filter-chip" onclick="toggle(this)">Seilbahn</div>
                <div class="filter-chip" onclick="toggle(this)">Öffis</div>
            </div>
        </div>

        <!-- SPOTS LIST -->
        <div class="spot-card">Hohe Wand – Ost</div>
        <div class="spot-card">Rax – West</div>
        <div class="spot-card">Gerlitzen – Süd</div>

    </div>

    <!-- WEATHER -->
    <div id="weatherMode" class="windy">
        <iframe src="https://embed.windy.com/embed.html?lat=47.5&lon=13.6&zoom=7&overlay=wind"></iframe>
    </div>

</div>

<script>
function toggle(el) {
    el.classList.toggle("active");
}

function switchMode(mode) {

    document.getElementById("spotsMode").style.display =
        mode === "spots" ? "block" : "none";

    document.getElementById("weatherMode").style.display =
        mode === "weather" ? "block" : "none";

    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
}
</script>

</body>
</html>
