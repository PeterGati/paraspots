<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Légtér teszt inline</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map { height:100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// térkép
const map = L.map('map').setView([47.6,14.3],7);

// alap térkép
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);


// 👉 BEÉPÍTETT DEMO "légtér"
const airspace = {
"type":"FeatureCollection",
"features":[
{
"type":"Feature",
"properties":{"name":"TESZT LÉGTÉR"},
"geometry":{
"type":"Polygon",
"coordinates":[[
[16.0,48.3],
[16.5,48.3],
[16.5,48.0],
[16.0,48.0],
[16.0,48.3]
]]
}
}
]
};


// megjelenítés
L.geoJSON(airspace,{
style:{
color:"red",
weight:2,
fillOpacity:0.2
},
onEachFeature:(f,l)=>l.bindPopup(f.properties.name)
}).addTo(map);

</script>

</body>
</html>
