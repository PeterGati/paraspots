<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Region – Startplätze</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
<h1 id="region-header-title">Region – Startplätze</h1>
        <nav class="header-nav">
            <a href="index.html">PARASPOTS</a>
            <a href="wetter.html">Wetter</a>
            <a href="airspace.html">Luftraum</a>
            <a href="#">Hilfe</a>
            <a href="new-site-admin.html">Neue Startplatz-Eingabe</a>
        </nav>
    </div>
</header>
<div class="page-layout">

    <!-- BAL OLDAL ÜRES (mint startplatznál) -->
    <aside class="left-column"></aside>

    <!-- KÖZÉP -->
    <main class="main-content">

        <section>
            <h2>Startplätze</h2>
            <div id="site-list" class="region-grid"></div>
        </section>

    </main>

    <!-- JOBB OLDAL ÜRES -->
    <aside class="right-column"></aside>

</div>

<footer class="site-footer">
    <p>© PARA:AT</p>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const regionSlug = params.get("region");

fetch("data/regions.json")
    .then(response => response.json())
    .then(data => {

        const region = data.regions.find(r => r.slug === regionSlug);
        const headerTitle = document.getElementById("region-header-title");
        const listElement = document.getElementById("site-list");

        if (!region) {
            headerTitle.textContent = "Unbekannte Region";
            listElement.innerHTML = "<p>Region nicht gefunden.</p>";
            return;
        }

        headerTitle.textContent = `${region.name} – Startplätze`;

        if (!region.sites || region.sites.length === 0) {
            listElement.innerHTML = "<p>Keine Startplätze vorhanden.</p>";
            return;
        }

        region.sites.forEach(site => {

            const card = document.createElement("a");
            card.href = `startplatz.html?region=${region.slug}&site=${site.slug}`;
            card.className = "region-card";

            card.innerHTML = `<h3>${site.name}</h3>`;
            listElement.appendChild(card);
        });

    })
    .catch(() => {
        document.getElementById("region-header-title").textContent = "Fehler";
        document.getElementById("site-list").innerHTML =
            "<p>Daten konnten nicht geladen werden.</p>";
    });
</script>
<script>
document.getElementById("new-site-link").addEventListener("click", function(e) {
    e.preventDefault();

    const code = prompt("Admin-Code eingeben:");
    if (code !== "123578") {
        alert("Falscher Code.");
        return;
    }

    window.open("new-site-admin.html", "_blank");
});
</script>

</body>
</html>
