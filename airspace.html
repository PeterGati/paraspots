<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Luftraum – Österreich</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
 
 

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
}
#airspace-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 72px;

    background: #ffffff;
    border-bottom: 1px solid #e2e6ec;

    display: flex;
    align-items: center;
    gap: 40px;
    padding: 0 32px;

    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #1f2a36;

    z-index: 1000;
}


#map {
    position: absolute;
    top: 72px;
    bottom: 0;
    left: 0;
    right: 0;
}
.airspace-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: 500;
}

.airspace-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    flex-shrink: 0;
}

/* =====================================
   LEAFLET POLYGON INTERACTION FIX
   ===================================== */
.airspace-home-link {
    margin-left: auto;
}

.airspace-home-link a {
    text-decoration: none;
    font-weight: 600;
    color: #1f2a36;
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.2s;
}

.airspace-home-link a:hover {
    background: #f2f4f7;
}
</style>
</head>

<body>

<div id="airspace-bar">
    <label class="airspace-item">
    <span class="airspace-color" style="background:#0c3f98"></span>
<input type="checkbox" id="ctr" checked disabled>
    CTR / MCTR
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#1f5fbf"></span>
    <input type="checkbox" id="tma" checked>
    TMA
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#6c5ce7"></span>
    <input type="checkbox" id="classc">
    Class C
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#c0392b"></span>
    <input type="checkbox" id="restricted" checked>
    Restricted
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#f39c12"></span>
    <input type="checkbox" id="temporary">
    Temporary
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#8e44ad"></span>
    <input type="checkbox" id="special">
    Special
</label>

<label class="airspace-item">
    <span class="airspace-color" style="background:#16a085"></span>
    <input type="checkbox" id="sport">
    Sport
</label>

<div class="airspace-home-link">
    <a href="index.html">← PARASPOTS</a>
    
</div>
</div>

<div id="map"></div>

<script>

// ==========================
// TÉRKÉP
// ==========================

var map = L.map('map').setView([47.394, 13.686], 8); 
// ==========================
// CUSTOM PANES (render order fix)
// ==========================

map.createPane('pane_tma');
map.getPane('pane_tma').style.zIndex = 400;

map.createPane('pane_ctr');
map.getPane('pane_ctr').style.zIndex = 500;

L.tileLayer(
 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
 { attribution:'© OpenStreetMap' }
).addTo(map);

// ==========================
// LAYER GROUPS
// ==========================

const groups = {
    ctr: L.layerGroup(),
    tma: L.layerGroup(),
    classc: L.layerGroup(),
    restricted: L.layerGroup(),
    temporary: L.layerGroup(),
    special: L.layerGroup(),
    sport: L.layerGroup()
};

// ==========================
// SZÍNEK
// ==========================

const styles = {
   ctr: {
    color:"#4b0082",       // sötét lila border
    weight:4,
    fill:"#7b2cbf",        // mélyebb lila fill
    fillOpacity:0.30
},
    tma: {
        color:"#1f5fbf",
        weight:4,
        fill:"#6ea3ff",
        fillOpacity:0.8
    },
    classc: {
        color:"#6c5ce7",
        weight:4,
        fill:"#a29bfe",
        fillOpacity:0.10
    },
    restricted: {
        color:"#c0392b",
        weight:4,
        fill:"#e74c3c",
        fillOpacity:0.18
    },
    temporary: {
        color:"#f39c12",
        weight:4,
        fill:"#f1c40f",
        fillOpacity:0.15
    },
    special: {
        color:"#8e44ad",
        weight:4,
        fill:"#9b59b6",
        fillOpacity:0.15
    },
    sport: {
        color:"#16a085",
        weight:4,
        fill:"#1abc9c",
        fillOpacity:0.12
    }
};

// ==========================
// GENERIKUS LOADER
// ==========================

// ==========================
// TMA GROUP STORAGE
// ==========================

const tmaGroups = {};

// ==========================
// FEET → METER CONVERTER
// ==========================

function feetToMeter(value){

    if(!value) return "";

    value = value.replace(/\s/g, "");

    if(value.startsWith("FL")){
        const fl = parseInt(value.replace("FL",""));
        const feet = fl * 100;
        const meters = Math.round(feet * 0.3048);
        return value + " (" + meters + " m)";
    }

    const feet = parseInt(value);
    if(isNaN(feet)) return value;

    const meters = Math.round(feet * 0.3048);
    return feet + " ft (" + meters + " m)";
}

// ==========================
// UPDATED LOADER
// ==========================

// ==========================
// FEET → METER
// ==========================

function formatAltitudeString(value){

    if(!value) return "";

    const original = value.trim();

    // GND
    if(original === "GND"){
        return "GND";
    }

    // Keresünk "but at least" részt
    const aglMatch = original.match(/(\d+)\s*FT\s*AGL/i);
    const amslMatch = original.match(/(\d+)\s*FT/i);
    const flMatch = original.match(/FL\s*(\d+)/i);

    let mainPart = "";
    let aglPart = "";

    // FL kezelés
    if(flMatch){
        const fl = parseInt(flMatch[1]);
        const feet = fl * 100;
        const meters = Math.round(feet * 0.3048);
        mainPart = "FL" + fl + " (" + meters + " m)";
    }

    // AMSL kezelés (ha nem FL)
    else if(amslMatch){
        const feet = parseInt(amslMatch[1]);
        const meters = Math.round(feet * 0.3048);
        mainPart = feet + " ft (" + meters + " m)";
    }

    // AGL rész külön kezelve
    if(aglMatch){
        const aglFeet = parseInt(aglMatch[1]);
        const aglMeters = Math.round(aglFeet * 0.3048);
        aglPart = "but at least " +
                  aglFeet + " ft AGL (" +
                  aglMeters + " m AGL)";
    }

    if(aglPart){
        return mainPart + "<br>" + aglPart;
    }

    return mainPart;
}

// ==========================
// FLOOR PARSER (render order)
// ==========================

function parseFloorToFeet(value){

    if(!value) return 999999;

    value = value.replace(/\s/g, "");

    if(value.startsWith("FL")){
        const fl = parseInt(value.replace("FL",""));
        return fl * 100;
    }

    const feet = parseInt(value);
    if(isNaN(feet)) return 999999;

    return feet;
}

// ==========================
// UPDATED LOADER
// ==========================

function loadGeoJSON(url, category){

    fetch(url)
        .then(r=>{
            if(!r.ok){
                throw new Error("HTTP error " + r.status + " for " + url);
            }
            return r.json();
        })
        .then(data=>{
        // ==========================
// REMOVE Z COORDINATES (3D → 2D)
// ==========================

function stripZ(geom){

    if(geom.type === "Polygon"){
        geom.coordinates = geom.coordinates.map(ring =>
            ring.map(coord => [coord[0], coord[1]])
        );
    }

    if(geom.type === "MultiPolygon"){
        geom.coordinates = geom.coordinates.map(polygon =>
            polygon.map(ring =>
                ring.map(coord => [coord[0], coord[1]])
            )
        );
    }

    return geom;
}

data.features.forEach(f=>{
    if(f.geometry){
        f.geometry = stripZ(f.geometry);
    }
});

           const geoLayer = L.geoJSON(data,{

    filter: function(feature){
        return feature.geometry &&
               (feature.geometry.type === "Polygon" ||
                feature.geometry.type === "MultiPolygon");
    },

   style:function(){
    return {
        pane: category === "ctr" ? "pane_ctr" :
              category === "tma" ? "pane_tma" : undefined,
        color: styles[category].color,
        weight: styles[category].weight,
        fill: true,
        fillColor: styles[category].fill,
        fillOpacity: category === "tma" ? 0.18 : styles[category].fillOpacity,
        fillRule: 'nonzero'
    };
},

   onEachFeature:function(f,l){

    const p = f.properties || {};
    const floor = p["Lower Limit"] || "?";
    const ceil  = p["Upper Limit"] || "?";

    let ident = p.IDENT || p.Name || "Airspace";
    
    if(category === "ctr"){
    ident = "CTR " + ident;
}


    if(category === "tma"){
        ident = "TMA " + ident;
    }
    
    
    l.bindPopup(
        "<b>" + ident + "</b><br>" +
        formatAltitudeString(floor) + " – " + formatAltitudeString(ceil)
    );

   

}

});

// ⬇️ EZ A FONTOS RÉSZ
geoLayer.addTo(groups[category]);

        })
        .catch(err=>{
            console.error("Load error:", err.message);
        });

}

// ==========================
// AUTOMATIKUS INDEX LOADER
// ==========================

fetch("airspace/airspace.json")    .then(r => {
        if (!r.ok) {
            throw new Error("Cannot load airspace index");
        }
        return r.json();
    })
    .then(index => {

    Object.keys(index).forEach(category => {

        index[category].forEach(path => {

            loadGeoJSON("airspace/" + path, category);

        });

    });

    // ⬇️ FONTOS: CTR mindig kerüljön felülre
   

})
    .catch(err => {
        console.error("Index load error:", err.message);
    });
// ==========================
// DEFAULT STATES
// ==========================

groups.restricted.addTo(map);
groups.tma.addTo(map);
groups.ctr.addTo(map);  // TMA legyen legfelül



// ==========================
// CHECKBOX LOGIKA
// ==========================

function bindToggle(id, group){

    document.getElementById(id).addEventListener("change", function(){
        if(this.checked){
            groups[group].addTo(map);
        } else {
            map.removeLayer(groups[group]);
        }
    });

}

bindToggle("tma","tma");
bindToggle("classc","classc");
bindToggle("restricted","restricted");
bindToggle("temporary","temporary");
bindToggle("special","special");
bindToggle("sport","sport");

</script>

</body>
</html>
